<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Join the Step Challenge</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0d1628;
      color: #eef2f8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }
    .card {
      width: 100%; max-width: 460px;
      background: #111e35;
      border: 1px solid #2a4270;
      border-radius: 12px;
      padding: 2rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }
    .logo {
      font-size: 0.7rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #5e7a9a;
      text-align: center;
    }
    h1 {
      font-size: 1.4rem;
      font-weight: 700;
      color: #eef2f8;
      text-align: center;
    }
    .subtitle {
      font-size: 0.9rem;
      color: #b0c2d8;
      line-height: 1.55;
      text-align: center;
    }
    .divider { border: none; border-top: 1px solid #2a4270; }
    .field { display: flex; flex-direction: column; gap: 0.35rem; }
    .field label {
      font-size: 0.65rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #5e7a9a;
    }
    .field input, .field select {
      width: 100%;
      background: #1e3258;
      border: 1px solid #2a4270;
      border-radius: 6px;
      color: #eef2f8;
      font-family: inherit;
      font-size: 0.95rem;
      padding: 0.6rem 0.85rem;
      outline: none;
      transition: border-color 0.15s;
      appearance: none;
    }
    .field input::placeholder { color: #5e7a9a; }
    .field input:focus, .field select:focus { border-color: #00B0B9; }
    .field select option { background: #1e3258; }
    .btn {
      display: flex; align-items: center; justify-content: center; gap: 0.5rem;
      width: 100%;
      border: none; border-radius: 6px;
      font-family: inherit;
      font-size: 0.9rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
      padding: 0.7rem 1rem; cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }
    .btn-primary { background: #c0392b; color: #fff; }
    .btn-primary:hover { background: #a93226; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-secondary {
      background: transparent; border: 1px solid #2a4270;
      color: #b0c2d8; text-decoration: none;
    }
    .btn-secondary:hover { background: #1e3258; color: #eef2f8; }
    .msg { font-size: 0.85rem; color: #e57373; text-align: center; min-height: 1.2rem; }

    /* ── Success state ── */
    .success { display: flex; flex-direction: column; align-items: center; gap: 1.25rem; text-align: center; }
    .check {
      width: 64px; height: 64px;
      background: #1a4a2a;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }
    .check svg { color: #4caf50; }
    .qr-label {
      font-size: 0.7rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #5e7a9a;
    }
    .qr-wrap {
      background: #fff;
      border-radius: 10px;
      padding: 12px;
      display: inline-flex;
    }
    .qr-wrap img { display: block; width: 200px; height: 200px; }
    .url { font-size: 0.85rem; color: #5e7a9a; }
    .steps {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      text-align: left;
    }
    .step {
      display: flex; gap: 0.75rem; align-items: flex-start;
      font-size: 0.875rem; color: #b0c2d8; line-height: 1.5;
    }
    .step-num {
      background: #1e3258; border: 1px solid #2a4270; border-radius: 50%;
      width: 24px; height: 24px; flex-shrink: 0; margin-top: 1px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.72rem; font-weight: 700; color: #5e7a9a;
    }
  </style>
</head>
<body>
<div class="card" id="card">
  <div class="logo">Walton High School</div>
  <h1>Join the Step Challenge</h1>
  <p class="subtitle">Enter your info below to sign up. You'll then get a link to connect your Fitbit and start tracking.</p>
  <hr class="divider"/>
  <div class="field">
    <label for="name-input">Full Name</label>
    <input id="name-input" type="text" placeholder="First Last" autocomplete="name"/>
  </div>
  <div class="field">
    <label for="dept-select">Department</label>
    <select id="dept-select">
      <option value="">-- Select department --</option>
      <option>Administration</option>
      <option>Clerical</option>
      <option>Counseling</option>
      <option>CTAE</option>
      <option>English</option>
      <option>Fine Arts</option>
      <option>Library</option>
      <option>Math</option>
      <option>Nurse</option>
      <option>Officer</option>
      <option>PE</option>
      <option>Science</option>
      <option>Social Studies</option>
      <option>Special Education</option>
      <option>World Language</option>
    </select>
  </div>
  <p class="msg" id="msg"></p>
  <button class="btn btn-primary" id="submit-btn" onclick="submitForm()">Join the Step Challenge</button>
</div>

<script>
  const SUPABASE_URL = 'https://cnuifibctivvdmxhtcfj.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_BdccknKAwSQKfgbvjK0elw_utfpB4Qc';

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function showSuccess(name) {
    document.getElementById('card').innerHTML = `
      <div class="logo">Walton High School &mdash; Step Challenge</div>
      <div class="success">
        <div class="check">
          <svg width="32" height="32" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </div>
        <h1>You're signed up!</h1>
        <p class="subtitle">Welcome to the challenge, ${esc(name)}! Scan the QR code or tap the button below to connect your Fitbit.</p>
        <hr class="divider" style="width:100%"/>
        <div class="qr-label">Scan to connect Fitbit</div>
        <div class="qr-wrap">
          <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&color=0d1628&bgcolor=ffffff&data=https%3A%2F%2Fwaltondashboard.com%2Ffitbit.html" alt="QR code"/>
        </div>
        <div class="url">waltondashboard.com/fitbit.html</div>
        <a class="btn btn-primary" href="https://waltondashboard.com/fitbit.html">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M17.5 0a2 2 0 1 1 0 4 2 2 0 0 1 0-4zm0 20a2 2 0 1 1 0 4 2 2 0 0 1 0-4zm-6-10a2 2 0 1 1 0 4 2 2 0 0 1 0-4zm-6 5a2 2 0 1 1 0 4 2 2 0 0 1 0-4zm0-10a2 2 0 1 1 0 4 2 2 0 0 1 0-4zm12 5a2 2 0 1 1 0 4 2 2 0 0 1 0-4z"/></svg>
          Connect Fitbit
        </a>
        <div class="steps">
          <div class="step">
            <div class="step-num">1</div>
            <span>Tap <strong>Connect Fitbit</strong> or scan the QR code above.</span>
          </div>
          <div class="step">
            <div class="step-num">2</div>
            <span>Sign in with your <strong>personal Fitbit account</strong> to authorize step tracking.</span>
          </div>
          <div class="step">
            <div class="step-num">3</div>
            <span>Your steps sync automatically. Revisit the link anytime to update your count.</span>
          </div>
        </div>
      </div>`;
  }

  async function submitForm() {
    const nameEl = document.getElementById('name-input');
    const deptEl = document.getElementById('dept-select');
    const msgEl  = document.getElementById('msg');
    const btn    = document.getElementById('submit-btn');

    const name = nameEl.value.trim();
    const dept = deptEl.value;

    if (!name) { msgEl.textContent = 'Please enter your full name.'; nameEl.focus(); return; }
    if (!dept) { msgEl.textContent = 'Please select your department.'; deptEl.focus(); return; }
    msgEl.textContent = '';

    btn.disabled = true;
    btn.textContent = 'Signing up…';

    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/step_challenge_roster`, {
        method: 'POST',
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${SUPABASE_KEY}`,
          'Content-Type': 'application/json',
          'Prefer': 'resolution=merge-duplicates',
        },
        body: JSON.stringify({ name, department: dept }),
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.message || `Error ${res.status}`);
      }
      // Store name + dept so fitbit.html uses the same values in the database
      localStorage.setItem('lb_user_name', name);
      localStorage.setItem('lb_user_dept', dept);
      showSuccess(name);
    } catch(e) {
      msgEl.textContent = `Something went wrong: ${e.message}`;
      btn.disabled = false;
      btn.textContent = 'Join the Step Challenge';
    }
  }

  // Allow Enter key to submit
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') submitForm();
  });
</script>
</body>
</html>
