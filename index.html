<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Walton High School Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      /* Walton Raiders school colors */
      --raider-red:      #cc2222;
      --raider-red-dim:  #8b1515;
      --raider-red-glow: #ff3333;
      --raider-blue:     #1a3a8f;
      --raider-blue-dim: #0f2260;
      --raider-white:    #ffffff;

      /* Midnight blue scale */
      --gm-darkest:  #080e1a;
      --gm-dark:     #0d1628;
      --gm-base:     #111e35;
      --gm-mid:      #162642;
      --gm-light:    #1e3258;
      --gm-border:   #2a4270;
      --gm-highlight:#3a5585;

      /* Text scale */
      --txt-bright:  #eef2f8;
      --txt-mid:     #b0c2d8;
      --txt-dim:     #5e7a9a;
      --txt-muted:   #2e4060;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--gm-darkest);
      color: var(--txt-bright);
      font-family: 'Barlow', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Subtle grain */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.025;
      pointer-events: none;
      z-index: 9999;
    }

    /* ══════════════════════════════
       HEADER
    ══════════════════════════════ */
    header {
      background: linear-gradient(135deg, var(--gm-light) 0%, var(--gm-dark) 55%, var(--gm-darkest) 100%);
      border-bottom: 3px solid var(--raider-red);
      padding: 0 2.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      position: relative;
      overflow: hidden;
      min-height: 80px;
    }
    /* Subtle blue glow behind logo */
    header::after {
      content: '';
      position: absolute;
      top: 50%; left: 80px;
      width: 160px; height: 160px;
      background: radial-gradient(ellipse, rgba(26,58,143,0.15) 0%, transparent 70%);
      transform: translateY(-50%);
      pointer-events: none;
    }

    .header-left {
      display: flex; align-items: center; gap: 1.2rem;
      position: relative; z-index: 1;
    }
    .school-logo { width: 58px; height: 60px; flex-shrink: 0; object-fit: contain; }

    /* ── Collapsible forecast ── */
    .forecast-toggle {
      display: flex; align-items: center; justify-content: space-between;
      margin: 0 -1.1rem;
      padding: 0.5rem 1.1rem;
      background: var(--gm-dark);
      border-top: 1px solid var(--gm-border);
      cursor: pointer;
      user-select: none;
      transition: background 0.15s;
    }
    .forecast-toggle:hover { background: var(--gm-mid); }
    .forecast-toggle-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.65rem; letter-spacing: 0.25em;
      text-transform: uppercase; color: var(--txt-dim);
    }
    .forecast-toggle-chevron {
      color: var(--txt-dim);
      transition: transform 0.25s ease;
    }
    .forecast-toggle-chevron.open { transform: rotate(180deg); }
    .forecast-collapsible {
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.3s ease;
    }
    .forecast-collapsible.open { max-height: 220px; }

    .school-name { display: flex; flex-direction: column; gap: 0.08rem; }
    .school-name-main {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800;
      font-size: clamp(1.4rem, 3vw, 2.1rem);
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--raider-white); line-height: 1;
    }
    .school-name-main em { font-style: normal; color: var(--raider-red); }
    .school-name-sub {
      font-size: 0.6rem; letter-spacing: 0.28em;
      text-transform: uppercase; color: var(--txt-dim);
    }

    .header-right {
      display: flex; flex-direction: column; align-items: flex-end;
      gap: 0.08rem; position: relative; z-index: 1;
    }
    #header-clock {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: clamp(1.7rem, 3.5vw, 2.6rem);
      letter-spacing: 0.04em; color: var(--txt-bright); line-height: 1;
    }
    #header-date {
      font-size: 0.6rem; letter-spacing: 0.22em;
      text-transform: uppercase; color: var(--txt-dim);
    }

    /* ══════════════════════════════
       MAIN GRID (columns)
    ══════════════════════════════ */
    main {
      padding: 1.5rem;
      max-width: 1600px;
      margin: 0 auto;
      display: flex;
      gap: 1.5rem;
      align-items: flex-start;
    }
    .widget-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      min-width: 0;
      min-height: 80px;
    }
    .widget-col::after {
      content: '';
      display: none;
    }
    .widget-col:empty::after { display: none; }
    .col-drop-placeholder {
      display: none;
      border: 2px dashed var(--gm-border);
      color: var(--txt-muted);
      font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase;
      align-items: center; justify-content: center;
      flex: 1;
      min-height: 200px;
      pointer-events: none;
    }
    .widget-col.drag-col-over .col-drop-placeholder {
      border-color: var(--raider-red);
      color: var(--raider-red);
    }
    .widget-col.drag-col-over {
      outline: 2px dashed var(--raider-red);
      outline-offset: 4px;
      border-radius: 2px;
    }
    .widget-item {
      width: 100%;
    }
    .widget-item.drag-item-over-top {
      border-top: 2px dashed var(--raider-red);
    }
    .widget-item.drag-item-over-top .widget {
      border-top-color: transparent;
    }
    .widget-item.drag-item-over-bottom {
      border-bottom: 2px dashed var(--raider-red);
    }
    @media (max-width: 900px) {
      main { flex-direction: column; gap: 1rem; padding: 1rem; }
      .widget-col { width: 100%; }
      .col-drop-placeholder { display: none !important; }
    }
    @media (max-width: 600px) {
      main { padding: 1rem; gap: 1rem; }
    }

    /* ══════════════════════════════
       WIDGET SHELL
    ══════════════════════════════ */
    .widget {
      background: var(--gm-base);
      border: 1px solid var(--gm-border);
      border-top: 3px solid var(--raider-red);
      overflow: hidden;
      animation: fadeUp 0.45s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .widget-header {
      padding: 0.65rem 1.1rem;
      border-bottom: 1px solid var(--gm-border);
      display: flex; align-items: center; gap: 0.55rem;
      justify-content: space-between;
      background: var(--gm-dark);
      cursor: pointer;
      user-select: none;
    }
    .widget-header:hover .widget-chevron { color: var(--txt-bright); }
    .widget-header-left {
      display: flex; align-items: center; gap: 0.55rem;
    }
    .widget-header-badge {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.68rem; font-weight: 700;
      letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--txt-mid);
      background: var(--gm-mid);
      border: 1px solid var(--gm-border);
      padding: 0.18rem 0.55rem;
      white-space: nowrap;
    }
    .widget-icon {
      width: 26px; height: 26px; flex-shrink: 0;
      background: var(--gm-mid);
      border: 1px solid var(--gm-border);
      display: flex; align-items: center; justify-content: center;
    }
    .widget-icon svg { color: var(--txt-bright); }
    .widget-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700; font-size: 0.7rem;
      letter-spacing: 0.3em; text-transform: uppercase;
      color: var(--txt-dim);
    }
    .widget-body { padding: 1.1rem; }

    /* ── Generic collapsible widget body ── */
    .widget-body-collapsible {
      overflow: hidden;
      transition: max-height 0.35s ease, opacity 0.25s ease;
      max-height: 1200px;
      opacity: 1;
    }
    .widget-body-collapsible.collapsed {
      max-height: 0;
      opacity: 0;
    }
    .widget-chevron {
      color: var(--txt-dim);
      flex-shrink: 0;
      transition: transform 0.25s ease, color 0.15s;
    }
    .widget-chevron.collapsed { transform: rotate(-90deg); }
    /* Temp shown in weather header when collapsed */
    .weather-header-temp {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800; font-size: 1.3rem;
      letter-spacing: 0.02em; color: var(--raider-white);
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s ease;
      white-space: nowrap;
    }
    .weather-header-temp.visible { opacity: 1; }
    /* ── Schedule collapsed period strip ── */
    .sched-period-strip {
      display: none;
      position: relative; overflow: hidden;
      align-items: center; gap: 0.75rem;
      padding: 0.5rem 0.75rem;
      background: var(--gm-light);
      border-top: 1px solid var(--gm-border);
    }
    .sched-period-strip.visible { display: flex; }
    .sched-strip-bg {
      position: absolute; left: 0; top: 0; bottom: 0;
      background: rgba(255,50,50,0.13);
      pointer-events: none;
    }
    .sched-strip-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700; font-size: 1rem;
      letter-spacing: 0.04em; color: var(--raider-white);
      position: relative; z-index: 1; flex-shrink: 0;
    }
    .sched-strip-times {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.82rem; font-weight: 600;
      color: var(--txt-mid); letter-spacing: 0.04em;
      position: relative; z-index: 1; margin-left: auto; flex-shrink: 0;
    }
    .sched-strip-countdown {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700; font-size: 0.85rem;
      color: var(--raider-red-glow); letter-spacing: 0.06em;
      z-index: 2; pointer-events: none;
    }
    .weather-header-temp sup {
      font-size: 0.65rem; vertical-align: super;
      color: var(--raider-red); font-weight: 600;
    }
    /* ══════════════════════════════
       WEATHER WIDGET
    ══════════════════════════════ */
    .weather-main {
      display: flex; align-items: center; gap: 1.1rem;
      margin-bottom: 0.9rem;
    }
    .weather-icon-wrap {
      width: 78px; height: 78px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      background: var(--gm-mid);
      border: 1px solid var(--gm-border);
    }
    .weather-temp {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800; font-size: 4.2rem;
      line-height: 1; letter-spacing: -0.02em;
      color: var(--raider-white);
    }
    .weather-temp sup {
      font-size: 1.5rem; vertical-align: super;
      color: var(--raider-red); font-weight: 600;
    }
    .weather-desc {
      font-size: 0.88rem; font-weight: 500;
      color: var(--txt-mid); letter-spacing: 0.03em;
      margin-top: 0.15rem; text-transform: capitalize;
    }
    .weather-location {
      font-size: 0.57rem; letter-spacing: 0.2em;
      text-transform: uppercase; color: var(--txt-dim); margin-top: 0.1rem;
    }

    /* stat strip */
    .weather-stats {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 1px; background: var(--gm-border);
      border-top: 1px solid var(--gm-border);
      margin: 0 -1.1rem -1.1rem;
    }
    .weather-stat {
      background: var(--gm-mid);
      padding: 0.6rem 0.75rem;
      display: flex; flex-direction: column; gap: 0.12rem;
    }
    .weather-stat-label {
      font-size: 0.62rem; letter-spacing: 0.18em;
      text-transform: uppercase; color: var(--txt-mid);
    }
    .weather-stat-value {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700; font-size: 1.1rem;
      letter-spacing: 0.04em; color: var(--txt-bright);
    }

    /* loading state */
    .weather-loading {
      display: flex; align-items: center; gap: 0.8rem;
      padding: 2rem 0; color: var(--txt-dim);
      font-size: 0.7rem; letter-spacing: 0.15em; text-transform: uppercase;
    }
    .spin {
      width: 18px; height: 18px; border-radius: 50%;
      border: 2px solid var(--gm-border);
      border-top-color: var(--raider-red);
      animation: spin 0.8s linear infinite; flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ══════════════════════════════
       BELL SCHEDULE WIDGET
    ══════════════════════════════ */
    .schedule-name {
      font-size: 0.6rem; letter-spacing: 0.22em;
      text-transform: uppercase; color: var(--txt-dim);
      margin-bottom: 0.8rem;
      display: flex; align-items: center; gap: 0.5rem;
    }
    .schedule-name-badge {
      background: var(--gm-mid);
      border: 1px solid var(--gm-border);
      color: var(--txt-mid);
      padding: 0.15rem 0.5rem;
      font-size: 0.58rem; letter-spacing: 0.18em;
    }

    .period-list { display: flex; flex-direction: column; gap: 2px; }

    .period-row {
      display: flex; align-items: center;
      gap: 0.75rem;
      padding: 0.5rem 0.75rem;
      background: var(--gm-mid);
      border: 1px solid transparent;
      transition: background 0.2s, border-color 0.2s;
      position: relative; overflow: hidden;
    }
    .period-row.is-past {
      opacity: 0.38;
    }
    .period-row.is-current {
      background: var(--gm-light);
      border-color: var(--raider-red);
    }
    /* Progress fill behind current period */
    .period-row.is-current .period-progress {
      position: absolute; left: 0; top: 0; bottom: 0;
      background: rgba(255,50,50,0.13);
      pointer-events: none;
      transition: width 60s linear;
    }

    .period-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700; font-size: 1rem;
      letter-spacing: 0.04em; color: var(--txt-bright);
      flex: 1; min-width: 0;
      position: relative; z-index: 1;
    }
    .period-row.is-current .period-name { color: var(--raider-white); }

    .period-times {
      display: flex; flex-direction: column; align-items: flex-end;
      gap: 0.05rem; flex-shrink: 0;
      position: relative; z-index: 1;
    }
    .period-time {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.82rem; font-weight: 600;
      color: var(--txt-mid); letter-spacing: 0.04em;
    }
    .period-row.is-current .period-time { color: var(--txt-bright); }

    /* Countdown — centered absolutely over the progress bar */
    .period-countdown {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.85rem; font-weight: 700;
      color: var(--raider-red-glow);
      letter-spacing: 0.06em;
      z-index: 2;
      pointer-events: none;
    }

    .schedule-no-school {
      text-align: center; padding: 2rem 1rem;
      color: var(--txt-dim);
      font-size: 0.75rem; letter-spacing: 0.2em; text-transform: uppercase;
    }
    .schedule-no-school strong {
      display: block;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.6rem; color: var(--gm-highlight);
      margin-bottom: 0.4rem; letter-spacing: 0.1em;
    }

    /* ══════════════════════════════
       LEADERBOARD WIDGET
    ══════════════════════════════ */
    .lb-tabs {
      display: flex; overflow-x: auto; scrollbar-width: none;
      border-bottom: 1px solid var(--gm-border);
      background: var(--gm-dark);
    }
    .lb-tabs::-webkit-scrollbar { display: none; }
    .lb-tab {
      flex-shrink: 0;
      padding: 0.55rem 0.9rem;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.68rem; font-weight: 700;
      letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--txt-dim);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s;
      white-space: nowrap;
      background: none; border-top: none; border-left: none; border-right: none;
      margin-bottom: -1px;
    }
    .lb-tab:hover { color: var(--txt-mid); }
    .lb-tab.active {
      color: var(--raider-white);
      border-bottom-color: var(--raider-red);
    }

    .lb-body { padding: 0.75rem 1.1rem 1.1rem; }

    .lb-list { display: flex; flex-direction: column; gap: 2px; }

    .lb-row {
      display: flex; align-items: center; gap: 0.7rem;
      padding: 0.45rem 0.65rem;
      background: var(--gm-mid);
    }
    .lb-rank {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800; font-size: 0.85rem;
      width: 1.6rem; height: 1.6rem; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      color: var(--txt-dim);
      border-radius: 50%;
    }
    .lb-row:nth-child(1) .lb-rank {
      background: #f5c842; color: #1a1200;
    }
    .lb-row:nth-child(2) .lb-rank {
      background: #8a9bb0; color: #0d1520;
    }
    .lb-row:nth-child(3) .lb-rank {
      background: #c87e4a; color: #1a0a00;
    }
    .lb-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 600; font-size: 0.95rem;
      letter-spacing: 0.03em; color: var(--txt-bright);
      flex: 1; min-width: 0;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .lb-steps {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700; font-size: 0.88rem;
      color: var(--txt-mid); flex-shrink: 0;
      letter-spacing: 0.03em;
    }
    .lb-empty {
      text-align: center; padding: 2rem 1rem;
      color: var(--txt-dim);
      font-size: 0.7rem; letter-spacing: 0.18em; text-transform: uppercase;
    }

    /* ══════════════════════════════
       INSTAGRAM WIDGET
    ══════════════════════════════ */
    .instagram-body {
      padding: 0;
      position: relative;
      overflow: hidden;
      background: var(--gm-dark);
    }
    .ig-slider {
      position: relative;
      aspect-ratio: 1;
      overflow: hidden;
    }
    .ig-slide {
      position: absolute; inset: 0;
      opacity: 0;
      transition: opacity 0.6s ease;
      pointer-events: none;
    }
    .ig-slide.active {
      opacity: 1;
      pointer-events: all;
    }
    .ig-slide img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
    }
    .ig-slide-link {
      position: absolute; inset: 0;
      display: flex; align-items: flex-end;
      background: linear-gradient(to top, rgba(0,0,0,0.55) 0%, transparent 50%);
      text-decoration: none;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .ig-slider:hover .ig-slide-link { opacity: 1; }
    .ig-caption {
      padding: 0.75rem;
      font-size: 0.68rem; color: var(--txt-mid);
      letter-spacing: 0.02em; line-height: 1.4;
      display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden;
    }
    .ig-controls {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.5rem 0.75rem;
      background: var(--gm-dark);
      border-top: 1px solid var(--gm-border);
    }
    .ig-dots {
      display: flex; gap: 0.35rem; align-items: center;
    }
    .ig-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--gm-border);
      cursor: pointer;
      transition: background 0.2s, transform 0.2s;
    }
    .ig-dot.active {
      background: var(--raider-white);
      transform: scale(1.3);
    }
    .ig-nav {
      display: flex; gap: 0.4rem;
    }
    .ig-nav button {
      background: var(--gm-mid); border: 1px solid var(--gm-border);
      color: var(--txt-dim); width: 26px; height: 26px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: color 0.15s, background 0.15s;
    }
    .ig-nav button:hover { background: var(--gm-light); color: var(--txt-bright); }
    .ig-counter {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.7rem; color: var(--txt-dim);
      letter-spacing: 0.1em;
    }

    /* ══════════════════════════════
       ANNOUNCEMENTS WIDGET
    ══════════════════════════════ */
    .announcements-list {
      display: flex; flex-direction: column;
      max-height: 320px; overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--gm-border) transparent;
    }
    .announcements-list::-webkit-scrollbar { width: 4px; }
    .announcements-list::-webkit-scrollbar-track { background: transparent; }
    .announcements-list::-webkit-scrollbar-thumb { background: var(--gm-border); border-radius: 2px; }
    .announcement-row {
      padding: 0.7rem 0;
      border-bottom: 1px solid var(--gm-border);
      font-size: 0.82rem; line-height: 1.5;
      color: var(--txt-mid); letter-spacing: 0.02em;
      display: flex; align-items: flex-start; gap: 0.6rem;
    }
    .announcement-row:last-child { border-bottom: none; }
    .announcement-bullet {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--raider-red); flex-shrink: 0;
      margin-top: 0.45rem;
    }
    .announcement-text { flex: 1; }
    .announcements-empty {
      text-align: center; padding: 2rem 1rem;
      color: var(--txt-dim); font-size: 0.7rem;
      letter-spacing: 0.18em; text-transform: uppercase;
    }
    /* Collapsed ticker strip */
    .ann-ticker {
      display: none;
      align-items: center; gap: 0.6rem;
      padding: 0.55rem 0.75rem;
      border-top: 1px solid var(--gm-border);
      background: var(--gm-mid);
      overflow: hidden;
      min-height: 2.4rem;
    }
    .ann-ticker.visible { display: flex; }
    .ann-ticker-bullet {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--raider-red); flex-shrink: 0;
    }
    .ann-ticker-text {
      flex: 1; font-size: 0.8rem; line-height: 1.4;
      color: var(--txt-mid); letter-spacing: 0.02em;
      opacity: 0; transition: opacity 0.4s ease;
    }
    .ann-ticker-text.visible { opacity: 1; }
    .ann-ticker-counter {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.65rem; color: var(--txt-dim);
      letter-spacing: 0.1em; flex-shrink: 0;
    }

    /* ══════════════════════════════
       DRAG AND DROP
    ══════════════════════════════ */
    .widget-item.dragging { opacity: 0.4; }
    .widget-drag-handle { cursor: grab; }
    .widget-drag-handle:active { cursor: grabbing; }
    .widget input, .widget button, .widget select,
    .widget a, .widget textarea, .lb-tab { cursor: pointer; }

    /* ══════════════════════════════
       RESPONSIVE
    ══════════════════════════════ */
    @media (min-width: 1400px) {
      header { padding: 0 3rem; min-height: 96px; }
      .school-logo { width: 72px; height: 74px; }
      .weather-temp { font-size: 5.2rem; }
    }
    @media (max-width: 600px) {
      header { padding: 0.8rem 1rem; min-height: auto; flex-wrap: wrap; gap: 0.75rem; }
      .school-logo { width: 44px; height: 46px; }
      .weather-temp { font-size: 3.4rem; }
      #header-clock { font-size: 1.5rem; }
      .school-name-sub { display: none; }
      .school-name { display: none; }
    }
    /* ══════════════════════════════
       WIDGET MANAGER
    ══════════════════════════════ */
    #widget-manager-btn {
      position: fixed; bottom: 1.5rem; right: 1.5rem;
      width: 44px; height: 44px;
      background: var(--gm-light);
      border: 1px solid var(--gm-border);
      color: var(--txt-mid);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; z-index: 2000;
      border-radius: 50%;
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
      transition: background 0.2s, color 0.2s, transform 0.2s;
    }
    #widget-manager-btn:hover { background: var(--gm-highlight); color: var(--txt-bright); transform: rotate(30deg); }
    #widget-manager-btn.open { background: var(--raider-red); color: var(--raider-white); transform: rotate(90deg); }

    #widget-manager-panel {
      position: fixed; bottom: 5rem; right: 1.5rem;
      width: 260px;
      background: var(--gm-base);
      border: 1px solid var(--gm-border);
      border-top: 3px solid var(--raider-red);
      z-index: 1999;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      opacity: 0; pointer-events: none;
      transform: translateY(10px) scale(0.97);
      transition: opacity 0.2s ease, transform 0.2s ease;
      transform-origin: bottom right;
    }
    #widget-manager-panel.open {
      opacity: 1; pointer-events: all;
      transform: translateY(0) scale(1);
    }
    .wm-header {
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--gm-border);
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700; font-size: 0.7rem;
      letter-spacing: 0.3em; text-transform: uppercase;
      color: var(--txt-dim);
      background: var(--gm-dark);
    }
    .wm-list { padding: 0.5rem 0; }
    .wm-row {
      display: flex; align-items: center;
      padding: 0.6rem 1rem; gap: 0.75rem;
      cursor: pointer; user-select: none;
      transition: background 0.15s;
    }
    .wm-row:hover { background: var(--gm-mid); }
    .wm-icon {
      width: 26px; height: 26px; flex-shrink: 0;
      background: var(--gm-mid); border: 1px solid var(--gm-border);
      display: flex; align-items: center; justify-content: center;
    }
    .wm-icon svg { color: var(--txt-bright); }
    .wm-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700; font-size: 0.78rem;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--txt-mid); flex: 1;
    }
    .wm-toggle {
      width: 34px; height: 18px; flex-shrink: 0;
      background: var(--gm-border); border-radius: 999px;
      position: relative; transition: background 0.2s;
    }
    .wm-toggle::after {
      content: '';
      position: absolute; top: 2px; left: 2px;
      width: 14px; height: 14px; border-radius: 50%;
      background: var(--txt-dim);
      transition: transform 0.2s, background 0.2s;
    }
    .wm-row.active .wm-toggle { background: var(--raider-red); }
    .wm-row.active .wm-toggle::after { transform: translateX(16px); background: var(--raider-white); }
    .wm-row.active .wm-label { color: var(--txt-bright); }
  </style>
</head>
<body>

<header>

<main>

        <div class="widget-header widget-drag-handle" >
          <div class="widget-header-left">
            <div class="widget-icon">
              <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">

          <div style="display:flex;align-items:center;gap:0.75rem;">

            <svg class="widget-chevron" id="schedule-chevron" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">

    <!-- Announcements Widget -->
    <div class="widget-item" data-id="announcements">

              <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path d="M22 17H2a3 3 0 0 0 3-3V9a7 7 0 0 1 14 0v5a3 3 0 0 0 3 3z"/>

              </svg>

<script>
  // ── Helpers ──
  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── Live clock ──
  function updateClock() {
    const now  = new Date();
    const h    = now.getHours();
    const m    = String(now.getMinutes()).padStart(2, '0');
    const ampm = h >= 12 ? 'PM' : 'AM';
    document.getElementById('header-clock').textContent = `${h % 12 || 12}:${m} ${ampm}`;
    const DAYS   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const MONTHS = ['January','February','March','April','May','June',
                    'July','August','September','October','November','December'];
    document.getElementById('header-date').textContent =
      `${DAYS[now.getDay()]}, ${MONTHS[now.getMonth()]} ${now.getDate()}, ${now.getFullYear()}`;
  }
  updateClock();
  setInterval(updateClock, 1000);

  // ── Widget collapse toggle (generic) ──
  const COLLAPSE_KEY = 'walton-widget-collapsed';

  function toggleWidget(id) {
    const collapsible = document.getElementById(`${id}-collapsible`);
    const chevron     = document.getElementById(`${id}-chevron`);
    if (!collapsible) return;
    const isCollapsed = collapsible.classList.toggle('collapsed');
    if (chevron) chevron.classList.toggle('collapsed', isCollapsed);
    // Weather-specific: show/hide temp in header
    if (id === 'weather') {
      const headerTemp = document.getElementById('weather-header-temp');
      if (headerTemp) headerTemp.classList.toggle('visible', isCollapsed);
    }
    if (id === 'schedule') updateSchedStrip();
    if (id === 'announcements') {
      if (isCollapsed) startAnnTicker();
      else { stopAnnTicker(); document.getElementById('ann-ticker')?.classList.remove('visible'); }
    }
    saveCollapseState();
  }

  function saveCollapseState() {
    const state = {};
    ['weather','schedule','leaderboard','instagram','announcements'].forEach(id => {
      const el = document.getElementById(`${id}-collapsible`);
      if (el) state[id] = el.classList.contains('collapsed');
    });
    localStorage.setItem(COLLAPSE_KEY, JSON.stringify(state));
  }

  function restoreCollapseState() {
    // Default: collapse weather on mobile
    const isMobile = window.innerWidth <= 600;
    const defaults = { weather: isMobile, schedule: false, leaderboard: false };

    let saved = {};
    try { saved = JSON.parse(localStorage.getItem(COLLAPSE_KEY) || '{}'); } catch(e) {}

    const state = { ...defaults, ...saved };
    ['weather','schedule','leaderboard','instagram','announcements'].forEach(id => {
      if (state[id]) {
        const collapsible = document.getElementById(`${id}-collapsible`);
        const chevron     = document.getElementById(`${id}-chevron`);
        if (collapsible) collapsible.classList.add('collapsed');
        if (chevron)     chevron.classList.add('collapsed');
        if (id === 'weather') {
          // temp will be populated once weather loads
        }
      }
    });
  }
  const LAT = 34.0154, LON = -84.4468;
  const SZ  = 46;

  function weatherIcon(code, isDay) {
    const d = isDay !== 0;
    if (code === 0)               return { label: d ? 'Clear Sky' : 'Clear Night',  svg: d ? sunSvg() : moonSvg() };
    if (code === 1)               return { label: 'Mainly Clear',                    svg: d ? sunSvg() : moonSvg() };
    if (code === 2)               return { label: 'Partly Cloudy',                   svg: partlyCloudySvg(d) };
    if (code === 3)               return { label: 'Overcast',                        svg: cloudSvg() };
    if (code >= 45 && code <= 48) return { label: 'Foggy',                           svg: fogSvg() };
    if (code >= 51 && code <= 57) return { label: 'Drizzle',                         svg: rainSvg() };
    if (code >= 61 && code <= 63) return { label: 'Light Rain',                      svg: rainSvg() };
    if (code >= 64 && code <= 65) return { label: 'Rain',                            svg: rainSvg() };
    if (code >= 66 && code <= 67) return { label: 'Heavy Rain',                      svg: rainSvg() };
    if (code >= 71 && code <= 77) return { label: 'Snow',                            svg: snowSvg() };
    if (code >= 80 && code <= 82) return { label: 'Showers',                         svg: rainSvg() };
    if (code >= 85 && code <= 86) return { label: 'Snow Showers',                    svg: snowSvg() };
    if (code >= 95)               return { label: 'Thunderstorm',                    svg: thunderSvg() };
    return { label: 'Unknown', svg: cloudSvg() };
  }

  function sunSvg() {
    return `<svg width="${SZ}" height="${SZ}" viewBox="0 0 44 44" fill="none">
      <circle cx="22" cy="22" r="9" fill="#f7ab6a" opacity="0.95"/>
      <g stroke="#f7ab6a" stroke-width="2.5" stroke-linecap="round" opacity="0.6">
        <line x1="22" y1="3" x2="22" y2="8"/><line x1="22" y1="36" x2="22" y2="41"/>
        <line x1="3" y1="22" x2="8" y2="22"/><line x1="36" y1="22" x2="41" y2="22"/>
        <line x1="8.1" y1="8.1" x2="11.4" y2="11.4"/><line x1="32.6" y1="32.6" x2="35.9" y2="35.9"/>
        <line x1="8.1" y1="35.9" x2="11.4" y2="32.6"/><line x1="32.6" y1="11.4" x2="35.9" y2="8.1"/>
      </g></svg>`;
  }
  function moonSvg() {
    return `<svg width="${SZ}" height="${SZ}" viewBox="0 0 44 44" fill="none">
      <path d="M30 22.5A12 12 0 0 1 18 10.5c0-1.2.18-2.36.5-3.46A13 13 0 1 0 33.46 22c-1.1.32-2.26.5-3.46.5z"
            fill="#c8d4de" opacity="0.9"/></svg>`;
  }
  function partlyCloudySvg(day) {
    return `<svg width="${SZ}" height="${SZ}" viewBox="0 0 44 44" fill="none">
      ${day
        ? `<circle cx="16" cy="15" r="7" fill="#f7ab6a" opacity="0.85"/>
           <g stroke="#f7ab6a" stroke-width="2" stroke-linecap="round" opacity="0.5">
             <line x1="16" y1="4" x2="16" y2="7"/><line x1="16" y1="23" x2="16" y2="26"/>
             <line x1="5" y1="15" x2="8" y2="15"/><line x1="24" y1="15" x2="27" y2="15"/>
           </g>`
        : `<path d="M27 17A8 8 0 0 1 14 11c0-.8.1-1.5.3-2.2A9 9 0 1 0 29 17z" fill="#c8d4de" opacity="0.45"/>`}
      <path d="M36 29a7 7 0 0 0-6.8-7 8 8 0 0 0-14.8 2.5A5 5 0 1 0 15 34h21a7 7 0 0 0 0-5z"
            fill="#7a90a0" opacity="0.72"/></svg>`;
  }
  function cloudSvg() {
    return `<svg width="${SZ}" height="${SZ}" viewBox="0 0 44 44" fill="none">
      <path d="M35 27a8 8 0 0 0-7.8-8 9 9 0 0 0-16.8 2.8A6 6 0 1 0 12 33h23a8 8 0 0 0 0-6z"
            fill="#7a90a0" opacity="0.75"/></svg>`;
  }
  function rainSvg() {
    return `<svg width="${SZ}" height="${SZ}" viewBox="0 0 44 44" fill="none">
      <path d="M35 22a8 8 0 0 0-7.8-8 9 9 0 0 0-16.8 2.8A6 6 0 1 0 12 27h23a8 8 0 0 0 0-5z"
            fill="#7a90a0" opacity="0.7"/>
      <g stroke="#7bb3d4" stroke-width="2" stroke-linecap="round" opacity="0.9">
        <line x1="14" y1="32" x2="12" y2="38"/><line x1="20" y1="32" x2="18" y2="38"/>
        <line x1="26" y1="32" x2="24" y2="38"/><line x1="32" y1="32" x2="30" y2="38"/>
      </g></svg>`;
  }
  function snowSvg() {
    return `<svg width="${SZ}" height="${SZ}" viewBox="0 0 44 44" fill="none">
      <path d="M35 22a8 8 0 0 0-7.8-8 9 9 0 0 0-16.8 2.8A6 6 0 1 0 12 27h23a8 8 0 0 0 0-5z"
            fill="#7a90a0" opacity="0.65"/>
      <g fill="#c8d4de" opacity="0.9">
        <circle cx="14" cy="33" r="2"/><circle cx="20" cy="38" r="2"/>
        <circle cx="26" cy="33" r="2"/><circle cx="32" cy="38" r="2"/>
      </g></svg>`;
  }
  function fogSvg() {
    return `<svg width="${SZ}" height="${SZ}" viewBox="0 0 44 44" fill="none">
      <g stroke="#7a90a0" stroke-width="2.5" stroke-linecap="round" opacity="0.75">
        <line x1="8" y1="15" x2="36" y2="15"/><line x1="6" y1="21" x2="38" y2="21"/>
        <line x1="10" y1="27" x2="34" y2="27"/><line x1="12" y1="33" x2="32" y2="33"/>
      </g></svg>`;
  }
  function thunderSvg() {
    return `<svg width="${SZ}" height="${SZ}" viewBox="0 0 44 44" fill="none">

  // Parse "h:mm AM/PM" or "h:mm" into total minutes since midnight
  function parseTime(str) {
    if (!str) return null;
    str = str.trim();
    const ampm = str.match(/(AM|PM)/i);
    const parts = str.replace(/(AM|PM)/i, '').trim().split(':');
    let h = parseInt(parts[0]), m = parseInt(parts[1] || 0);
    if (ampm) {
      const isPM = ampm[0].toUpperCase() === 'PM';
      if (isPM && h !== 12) h += 12;
      if (!isPM && h === 12) h = 0;
    }
    return h * 60 + m;
  }

  function formatTime(str) {
    // Normalize to "h:mm AM/PM"
    if (!str) return '';
    str = str.trim();
    if (str.match(/(AM|PM)/i)) return str;
    const parts = str.split(':');
    let h = parseInt(parts[0]), m = parseInt(parts[1] || 0);
    const ampm = h >= 12 ? 'PM' : 'AM';
    if (h > 12) h -= 12;
    if (h === 0) h = 12;
    return `${h}:${String(m).padStart(2,'0')} ${ampm}`;
  }

  function minutesToNow() {
    const now = new Date();
    return now.getHours() * 60 + now.getMinutes();
  }

  function minsToStr(mins) {
    if (mins <= 0) return '';
    const h = Math.floor(mins / 60), m = mins % 60;
    if (h > 0) return `${h}h ${m}m left`;
    return `${m}m left`;
  }

  function calcDuration(start, end) {
    const mins = end - start;
    const h = Math.floor(mins / 60), m = mins % 60;
    if (h > 0 && m > 0) return `${h}h ${m}m`;
    if (h > 0) return `${h}h`;
    return `${m}m`;
  }

  async function fetchSchedule() {
    const body = document.getElementById('schedule-body');

    // Don't show schedule on weekends
    const now     = new Date();
    const weekday = now.getDay();
    if (weekday === 0 || weekday === 6) {
      body.innerHTML = `<div class="schedule-no-school">
        <strong>No School Today</strong>Enjoy your weekend!
      </div>`;
      return;
    }

    try {
      // Step 1: Read Calendar tab to find today's schedule override
      const todayStr = `${now.getMonth()+1}/${now.getDate()}/${now.getFullYear()}`;
      const altFormats = [
        todayStr,
        `${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')}/${now.getFullYear()}`,
        `${now.getMonth()+1}/${now.getDate()}/${String(now.getFullYear()).slice(-2)}`,
        `${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')}/${String(now.getFullYear()).slice(-2)}`,
        now.toISOString().split('T')[0], // YYYY-MM-DD
      ];

      let tabToUse = 'Daily';
      try {
        const calRows = await fetchSheetData('Calendar');
        // Skip header row if present (check if first cell looks like "date")
        const dataRows = calRows[0] && calRows[0][0].toLowerCase().includes('date')
          ? calRows.slice(1) : calRows;

        for (const row of dataRows) {
          if (!row[0] || !row[1]) continue;
          const cellDate = row[0].trim();
          if (altFormats.includes(cellDate)) {
            tabToUse = row[1].trim();
            break;
          }
        }
      } catch(e) {
        // Calendar tab read failed — fall back to Daily
        console.warn('Calendar tab read failed, using Daily');
      }

      // Step 2: Load the schedule from the resolved tab
      const scheduleRows = await fetchSheetData(tabToUse);
      const dataRows = scheduleRows[0] && scheduleRows[0][0].toLowerCase().includes('period')
        ? scheduleRows.slice(1) : scheduleRows;

      if (!dataRows.length) {
        body.innerHTML = `<div class="schedule-no-school"><strong>No Schedule</strong>No periods found for today.</div>`;
        return;
      }

      const periods = dataRows
        .filter(r => r[0] && r[1] && r[2])
        .map(r => ({
          name:  r[0].trim(),
          start: parseTime(r[1]),
          end:   parseTime(r[2]),
          startStr: formatTime(r[1]),
          endStr:   formatTime(r[2]),
        }));

      renderSchedule(periods, tabToUse);

    } catch(e) {
      console.error(e);
      body.innerHTML = `<div class="weather-loading" style="color:var(--raider-red);flex-direction:column;align-items:flex-start;gap:0.4rem;">
        <span>Unable to load schedule</span>
        <span style="font-size:0.6rem;color:var(--txt-dim);letter-spacing:0.05em;text-transform:none;">${e.message}</span>
      </div>`;
    }
  }

  function updateSchedStrip() {
    const strip    = document.getElementById('sched-period-strip');
    const bg       = document.getElementById('sched-strip-bg');
    const nameEl   = document.getElementById('sched-strip-name');
    const countdown= document.getElementById('sched-strip-countdown');
    const timesEl  = document.getElementById('sched-strip-times');
    if (!strip) return;

    const isCollapsed = document.getElementById('schedule-collapsible')?.classList.contains('collapsed');
    if (!isCollapsed) { strip.classList.remove('visible'); return; }

    const nowMin  = minutesToNow();
    const current = currentSchedulePeriods?.find(p => nowMin >= p.start && nowMin < p.end);
    if (!current) { strip.classList.remove('visible'); return; }

    const pct = Math.round(((nowMin - current.start) / (current.end - current.start)) * 100);
    bg.style.width        = `${pct}%`;
    nameEl.textContent    = current.name;
    countdown.textContent = minsToStr(current.end - nowMin);
    timesEl.textContent   = `${current.startStr} – ${current.endStr}`;
    strip.classList.add('visible');
  }

  function renderSchedule(periods, tabName) {
    const body   = document.getElementById('schedule-body');
    const nowMin = minutesToNow();

    const rows = periods.map(p => {
      const isPast    = nowMin >= p.end;
      const isCurrent = nowMin >= p.start && nowMin < p.end;
      const pct       = isCurrent
        ? Math.round(((nowMin - p.start) / (p.end - p.start)) * 100)
        : 0;
      const remaining = isCurrent ? minsToStr(p.end - nowMin) : '';

      return `<div class="period-row ${isPast ? 'is-past' : ''} ${isCurrent ? 'is-current' : ''}">
        ${isCurrent ? `<div class="period-progress" style="width:${pct}%"></div>` : ''}
        <div class="period-name">${p.name}</div>
        <div class="period-times">
          <span class="period-time">${p.startStr} – ${p.endStr}</span>
        </div>
        ${isCurrent ? `<div class="period-countdown">${remaining}</div>` : ''}

    }).join('');

    const badge = document.getElementById('schedule-badge');

  const GRID_ORDER_KEY = 'walton-widget-order';

  function initDragAndDrop() {
    document.querySelectorAll('.widget-item').forEach(attachDrag);
    document.querySelectorAll('.widget-col').forEach(attachColDrop);
  }

  function attachDrag(item) {
    const handle = item.querySelector('.widget-drag-handle');
    if (!handle) return;

    handle.addEventListener('mousedown', (e) => {
      if (e.target.closest('button, a, input, select, textarea')) return;
      e.preventDefault();

      let moved = false;
      const startX = e.clientX, startY = e.clientY;

      function onMoveCheck(ev) {
        if (Math.abs(ev.clientX - startX) > 6 || Math.abs(ev.clientY - startY) > 6) {
          moved = true;
          document.removeEventListener('mousemove', onMoveCheck);
          // Commit to drag
          const h = item.offsetHeight;
          document.querySelectorAll('.widget-col').forEach(col => {
            const placeholder = col.querySelector('.col-drop-placeholder');
            if (!placeholder) return;
            placeholder.style.minHeight = `${h}px`;
            const widgets = col.querySelectorAll('.widget-item');
            placeholder.style.display = (widgets.length === 0 || (widgets.length === 1 && widgets[0] === item)) ? 'flex' : 'none';
          });
          startDrag(item, ev.clientX, ev.clientY);
        }
      }

      function onMouseUp() {
        document.removeEventListener('mousemove', onMoveCheck);
        document.removeEventListener('mouseup', onMouseUp);
        // If mouse didn't move much, treat as a click → toggle collapse
        if (!moved) {
          const widgetEl = item.querySelector('.widget');
          if (widgetEl) {
            const id = item.dataset.id;
            if (id) toggleWidget(id);
          }
        }
      }

      document.addEventListener('mousemove', onMoveCheck);
      document.addEventListener('mouseup', onMouseUp);
    });
  }

  function startDrag(item, startX, startY) {
    dragItem = item;
    item.classList.add('dragging');

    function onMouseMove(e) {
      // Highlight column/position under cursor
      clearDropHighlights();
      const el = document.elementFromPoint(e.clientX, e.clientY);
      if (!el) return;
      const col = el.closest('.widget-col');
      if (!col) return;
      const target = el.closest('.widget-item');
      if (target && target !== dragItem) {
        const rect = target.getBoundingClientRect();
        const mid  = rect.top + rect.height / 2;
        if (e.clientY < mid) target.classList.add('drag-item-over-top');
        else                  target.classList.add('drag-item-over-bottom');
      } else if (!target) {
        col.classList.add('drag-col-over');
      }
    }

    function onMouseUp(e) {
      document.removeEventListener('mousemove', onMouseMove);
      document.removeEventListener('mouseup',   onMouseUp);
      dragItem.classList.remove('dragging');

      const el = document.elementFromPoint(e.clientX, e.clientY);
      if (el) {
        const col    = el.closest('.widget-col');
        const target = el.closest('.widget-item');
        if (col && dragItem !== target) {
          if (target) {
            const rect = target.getBoundingClientRect();
            const mid  = rect.top + rect.height / 2;
            if (e.clientY < mid) col.insertBefore(dragItem, target);
            else                  col.insertBefore(dragItem, target.nextSibling);
          } else {
            col.appendChild(dragItem);
          }
        }
      }

      clearDropHighlights();
      saveLayout();
      dragItem = null;
      updatePlaceholders();
    }

    document.addEventListener('mousemove', onMouseMove);
    document.addEventListener('mouseup',   onMouseUp);
  }

  function clearDropHighlights() {
    document.querySelectorAll('.drag-item-over-top, .drag-item-over-bottom')
      .forEach(el => { el.classList.remove('drag-item-over-top','drag-item-over-bottom'); });
    document.querySelectorAll('.drag-col-over')
      .forEach(el => el.classList.remove('drag-col-over'));
  }

  function attachColDrop(col) {
    // Already handled via mouseup above
  }

  function updatePlaceholders() {
    document.querySelectorAll('.widget-col').forEach(col => {
      const placeholder = col.querySelector('.col-drop-placeholder');
      if (!placeholder) return;
      const hasWidgets = col.querySelectorAll('.widget-item').length > 0;
      // Only show placeholder if column is empty AND we're actively dragging
      placeholder.style.display = (hasWidgets || !dragItem) ? 'none' : 'flex';
      placeholder.style.minHeight = '200px';
    });
  }

  function saveLayout() {
    // Don't save on mobile — mobile always uses col-0, we don't want to overwrite desktop layout
    if (window.innerWidth <= 900) return;
    const layout = {};
    document.querySelectorAll('.widget-col').forEach(col => {
      const colId = col.id;
      layout[colId] = [...col.querySelectorAll('.widget-item')].map(i => i.dataset.id);
    });
    localStorage.setItem(GRID_ORDER_KEY, JSON.stringify(layout));
  }

  function restoreLayout() {
    const saved = localStorage.getItem(GRID_ORDER_KEY);
    const isMobile = window.innerWidth <= 900;

    if (isMobile) {
      const col0 = document.getElementById('col-0');
      const mobileOrder = ['weather', 'schedule', 'announcements', 'instagram', 'leaderboard'];

      // Determine order — use saved if available, otherwise default
      let order = mobileOrder;
      if (saved) {
        try {
          const layout = JSON.parse(saved);
          const flat = Object.values(layout).flat();
          if (flat.length) order = flat;
        } catch(e) {}
      }

      // Move every widget into col-0 in order
      order.forEach(id => {
        const item = document.querySelector(`.widget-item[data-id="${id}"]`);
        if (item && col0) col0.appendChild(item);
      });

      // Hide col-1 and col-2 — they're now empty
      document.getElementById('col-1').style.display = 'none';
      document.getElementById('col-2').style.display = 'none';
      return;
    }

    if (!saved) return;
    try {
      const layout = JSON.parse(saved);
      Object.entries(layout).forEach(([colId, ids]) => {
        const col = document.getElementById(colId);
        if (!col) return;
        ids.forEach(id => {
          const item = document.querySelector(`.widget-item[data-id="${id}"]`);
          if (item) col.appendChild(item);
        });
      });
    } catch(e) { /* ignore */ }
  }

      const slide = document.createElement('div');
      slide.className = 'ig-slide' + (i === 0 ? ' active' : '');
      const img = document.createElement('img');
      img.src     = post.mediaUrl;
      img.alt     = post.caption ? post.caption.slice(0, 60) : 'Instagram post';
      img.loading = 'lazy';
      const link = document.createElement('a');
      link.className = 'ig-slide-link';
      link.href      = post.permalink;
      link.target    = '_blank';
      link.rel       = 'noopener';
      if (post.caption) {
        const cap = document.createElement('div');
        cap.className   = 'ig-caption';
        cap.textContent = post.caption;
        link.appendChild(cap);
      }
      slide.appendChild(img);
      slide.appendChild(link);
      slider.appendChild(slide);

      // Dot
      const dot = document.createElement('div');
      dot.className = 'ig-dot' + (i === 0 ? ' active' : '');
      dot.onclick   = () => igGoTo(i);
      dotsEl.appendChild(dot);
    });

    igUpdateCounter();
  }

  function igGoTo(idx) {
    const slides = document.querySelectorAll('.ig-slide');
    const dots   = document.querySelectorAll('.ig-dot');
    if (!slides.length) return;
    slides[igCurrent].classList.remove('active');
    dots[igCurrent].classList.remove('active');
    igCurrent = (idx + igPosts.length) % igPosts.length;
    slides[igCurrent].classList.add('active');
    dots[igCurrent].classList.add('active');
    igUpdateCounter();
    // Reset timer
    igStop(); igStart();
  }

  function igNav(dir) { igGoTo(igCurrent + dir); }

  function igUpdateCounter() {
    const el = document.getElementById('ig-counter');
    if (el) el.textContent = `${igCurrent + 1} / ${igPosts.length}`;
  }

  function igStart() {
    igTimer = setInterval(() => igGoTo(igCurrent + 1), IG_INTERVAL);
  }
  function igStop() {
    if (igTimer) { clearInterval(igTimer); igTimer = null; }
  }

  initInstagram();

  // ══════════════════════════════════════════════
  //  ANNOUNCEMENTS
  // ══════════════════════════════════════════════
  let annItems   = [];
  let annIndex   = 0;
  let annTimer   = null;

  function startAnnTicker() {
    stopAnnTicker();
    if (!annItems.length) return;
    updateAnnTicker();
    annTimer = setInterval(() => {
      const textEl = document.getElementById('ann-ticker-text');
      if (textEl) textEl.classList.remove('visible');
      setTimeout(() => {
        annIndex = (annIndex + 1) % annItems.length;
        updateAnnTicker();
      }, 400);
    }, 4000);
  }

  function stopAnnTicker() {
    if (annTimer) { clearInterval(annTimer); annTimer = null; }
  }

  function updateAnnTicker() {
    const ticker  = document.getElementById('ann-ticker');
    const textEl  = document.getElementById('ann-ticker-text');
    const counter = document.getElementById('ann-ticker-counter');
    if (!ticker || !annItems.length) return;
    const isCollapsed = document.getElementById('announcements-collapsible')?.classList.contains('collapsed');
    if (!isCollapsed) { ticker.classList.remove('visible'); stopAnnTicker(); return; }
    textEl.textContent  = annItems[annIndex];
    counter.textContent = `${annIndex + 1}/${annItems.length}`;
    ticker.classList.add('visible');
    setTimeout(() => textEl.classList.add('visible'), 20);
  }

  async function fetchAnnouncements() {
    const body = document.getElementById('announcements-body');
    if (!body) return;
    try {
      const rows = await fetchSheetData('Announcements');
      console.log('[ANN] rows:', JSON.stringify(rows.slice(0,3)));
      if (!rows.length) {
        body.innerHTML = `<div class="announcements-empty">No announcements</div>`;
        return;
      }
      const first = (rows[0][0] || '').toLowerCase();
      const data  = ['announcement','text','message','note'].includes(first) ? rows.slice(1) : rows;
      const items = data
        .filter(r => r[0] && r[0].trim())
        .map(r => r[0].trim());
      annItems = items;
      annIndex = 0;
      body.innerHTML = items.length
        ? `<div class="announcements-list">${items.map(t => `
          <div class="announcement-row">
            <div class="announcement-bullet"></div>
            <div class="announcement-text">${escHtml(t)}</div>
          </div>`).join('')}</div>`
        : `<div class="announcements-empty">No announcements</div>`;
      updateAnnTicker();
      const isCollapsed = document.getElementById('announcements-collapsible')?.classList.contains('collapsed');
      if (isCollapsed && annItems.length) startAnnTicker();
    } catch(e) {
      console.error('[ANN] Error:', e);
      body.innerHTML = `<div class="announcements-empty">${e.message}</div>`;
    }
  }
  restoreLayout();
  restoreCollapseState();
  initDragAndDrop();
  updatePlaceholders();
  initLeaderboard();
  setInterval(() => { lbDataCache = {}; initLeaderboard(); }, 5 * 60 * 1000);

  fetchAnnouncements();
  setInterval(fetchAnnouncements, 5 * 60 * 1000);

  fetchSchedule();
  setInterval(() => { fetchSchedule(); updateSchedStrip(); }, 60 * 1000);

  fetchWeather();
  setInterval(fetchWeather, 10 * 60 * 1000);

  // ══════════════════════════════════════════════
  //  WIDGET MANAGER
  // ══════════════════════════════════════════════
  const WIDGET_VISIBILITY_KEY = 'walton-widget-visibility';

  const WIDGET_REGISTRY = [
    {
      id: 'weather', label: 'Current Weather',
      icon: `<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>`
    },
    {
      id: 'schedule', label: 'Bell Schedule',
      icon: `<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`
    },
    {
      id: 'instagram', label: '@waltonesports',
      icon: `<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/></svg>`
    },
    {
      id: 'announcements', label: 'Announcements',
      icon: `<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M22 17H2a3 3 0 0 0 3-3V9a7 7 0 0 1 14 0v5a3 3 0 0 0 3 3z"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>`
    },
    {
      id: 'leaderboard', label: 'Step Challenge',
      icon: `<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>`
    },
  ];

  function loadVisibility() {
    try { return JSON.parse(localStorage.getItem(WIDGET_VISIBILITY_KEY) || '{}'); }
    catch(e) { return {}; }
  }

  function saveVisibility(vis) {
    localStorage.setItem(WIDGET_VISIBILITY_KEY, JSON.stringify(vis));
  }

  function applyVisibility() {
    const vis = loadVisibility();
    WIDGET_REGISTRY.forEach(w => {
      const item = document.querySelector(`.widget-item[data-id="${w.id}"]`);
      if (!item) return;
      const visible = vis[w.id] !== false; // default visible
      item.style.display = visible ? '' : 'none';
    });
  }

  function buildWidgetManager() {
    const vis  = loadVisibility();
    const list = document.getElementById('wm-list');
    list.innerHTML = '';
    WIDGET_REGISTRY.forEach(w => {
      const visible = vis[w.id] !== false;
      const row = document.createElement('div');
      row.className = 'wm-row' + (visible ? ' active' : '');
      row.innerHTML = `
        <div class="wm-icon">${w.icon}</div>
        <span class="wm-label">${w.label}</span>
        <div class="wm-toggle"></div>`;
      row.addEventListener('click', () => {
        const v = loadVisibility();
        const nowVisible = v[w.id] !== false;
        v[w.id] = !nowVisible;
        saveVisibility(v);
        row.classList.toggle('active', !nowVisible);
        applyVisibility();
      });
      list.appendChild(row);
    });
  }

  function toggleWidgetManager() {
    const btn   = document.getElementById('widget-manager-btn');
    const panel = document.getElementById('widget-manager-panel');
    const isOpen = panel.classList.toggle('open');
    btn.classList.toggle('open', isOpen);
    if (isOpen) buildWidgetManager();
  }

  // Close panel when clicking outside
  document.addEventListener('click', (e) => {
    const btn   = document.getElementById('widget-manager-btn');
    const panel = document.getElementById('widget-manager-panel');
    if (!btn.contains(e.target) && !panel.contains(e.target)) {
      panel.classList.remove('open');
      btn.classList.remove('open');
    }
  });

  applyVisibility();
</script>

<!-- Widget Manager -->
<button id="widget-manager-btn" onclick="toggleWidgetManager()" title="Manage Widgets">
  <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
    <circle cx="12" cy="12" r="3"/>
    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
  </svg>
</button>

<div id="widget-manager-panel">
  <div class="wm-header">Manage Widgets</div>
  <div class="wm-list" id="wm-list"></div>
</div>

</body>
</html>
