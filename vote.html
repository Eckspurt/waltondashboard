<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="icon" type="image/png" href="logo.png"/>
  <title>Question of the Day</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0d1628;
      color: #eef2f8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }
    .card {
      width: 100%; max-width: 480px;
      background: #111e35;
      border: 1px solid #2a4270;
      border-radius: 12px;
      padding: 2rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }
    .logo {
      font-size: 0.7rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #5e7a9a;
      text-align: center;
    }
    .question {
      font-size: 1.25rem;
      font-weight: 600;
      line-height: 1.45;
      text-align: center;
      color: #eef2f8;
    }
    .options { display: flex; flex-direction: column; gap: 0.6rem; }
    .opt {
      display: flex; align-items: center; gap: 0.75rem;
      width: 100%;
      background: #1e3258;
      border: 1px solid #2a4270;
      color: #eef2f8;
      padding: 0.85rem 1rem;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      text-align: left;
      transition: background 0.15s, border-color 0.15s;
    }
    .opt:hover:not(:disabled)  { background: #2a4270; border-color: #3a5585; }
    .opt.picked  { background: #8b1515; border-color: #cc2222; }
    .opt:disabled { opacity: 0.5; cursor: not-allowed; }
    .letter {
      font-weight: 800;
      font-size: 0.9rem;
      letter-spacing: 0.08em;
      min-width: 1.5em;
      color: #b0c2d8;
      flex-shrink: 0;
    }
    .opt.picked .letter { color: #fff; }
    .msg {
      text-align: center;
      font-size: 1rem;
      color: #b0c2d8;
      min-height: 1.5rem;
    }
    .msg.error { color: #e57373; }
    .thanks {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
    }
    .thanks-check {
      width: 56px; height: 56px;
      background: #1a4a2a;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }
    .thanks-check svg { color: #4caf50; }
    .thanks h2 { font-size: 1.4rem; color: #eef2f8; }
    .thanks p  { font-size: 0.9rem; color: #5e7a9a; }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid #2a4270;
      border-top-color: #5e7a9a;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 1rem auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .close-btn {
      width: 100%;
      background: transparent;
      border: 1px solid #2a4270;
      color: #5e7a9a;
      padding: 0.65rem 1rem;
      border-radius: 8px;
      font-size: 0.88rem;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }
    .close-btn:hover { background: #1e3258; border-color: #3a5585; color: #eef2f8; }
  </style>
</head>
<body>
<div class="card" id="card">
  <div class="logo">Walton High School &mdash; Question of the Day</div>
  <div class="spinner" id="spinner"></div>
</div>

<script>
  const SUPABASE_URL = 'https://cnuifibctivvdmxhtcfj.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_BdccknKAwSQKfgbvjK0elw_utfpB4Qc';
  const LETTERS = ['A','B','C','D','E','F'];

  // ── Song Battle bracket data ──────────────────
  const SB_SONGS = {
    '90s':[{seed:1,title:'Iris',artist:'Goo Goo Dolls'},{seed:2,title:'Smells Like Teen Spirit',artist:'Nirvana'},{seed:3,title:'Wonderwall',artist:'Oasis'},{seed:4,title:"Gangsta's Paradise",artist:'Coolio'},{seed:5,title:'I Want It That Way',artist:'Backstreet Boys'},{seed:6,title:'…Baby One More Time',artist:'Britney Spears'},{seed:7,title:'I Will Always Love You',artist:'Whitney Houston'},{seed:8,title:'1979',artist:'Smashing Pumpkins'},{seed:9,title:'Waterfalls',artist:'TLC'}],
    '2000s':[{seed:1,title:'Mr. Brightside',artist:'The Killers'},{seed:2,title:'Lose Yourself',artist:'Eminem'},{seed:3,title:'Numb',artist:'Linkin Park'},{seed:4,title:'Umbrella',artist:'Rihanna'},{seed:5,title:'Seven Nation Army',artist:'The White Stripes'},{seed:6,title:'Yeah!',artist:'Usher'},{seed:7,title:'Hey Ya!',artist:'OutKast'},{seed:8,title:'Single Ladies',artist:'Beyoncé'},{seed:9,title:'Bye Bye Bye',artist:'NSYNC'}],
    '2010s':[{seed:1,title:'Blinding Lights',artist:'The Weeknd'},{seed:2,title:'Shape of You',artist:'Ed Sheeran'},{seed:3,title:'Uptown Funk',artist:'Mark Ronson ft. Bruno Mars'},{seed:4,title:'Rolling in the Deep',artist:'Adele'},{seed:5,title:'Old Town Road',artist:'Lil Nas X'},{seed:6,title:'Shake It Off',artist:'Taylor Swift'},{seed:7,title:'Royals',artist:'Lorde'},{seed:8,title:'Happy',artist:'Pharrell Williams'},{seed:9,title:'Call Me Maybe',artist:'Carly Rae Jepsen'}],
    '2020s':[{seed:1,title:'As It Was',artist:'Harry Styles'},{seed:2,title:'Stay',artist:'The Kid LAROI & Justin Bieber'},{seed:3,title:'Heat Waves',artist:'Glass Animals'},{seed:4,title:'Espresso',artist:'Sabrina Carpenter'},{seed:5,title:'Flowers',artist:'Miley Cyrus'},{seed:6,title:'Levitating',artist:'Dua Lipa'},{seed:7,title:'Anti-Hero',artist:'Taylor Swift'},{seed:8,title:'Thank U, Next',artist:'Ariana Grande'},{seed:9,title:'Golden',artist:'K-Pop Demon Hunters'}],
  };
  const SB_GAMES = [
    {n:1,date:'2026-07-31',a:{d:'90s',  s:8},b:{d:'90s',  s:9}},
    {n:2,date:'2026-08-07',a:{d:'2000s',s:8},b:{d:'2000s',s:9}},
    {n:3,date:'2026-08-14',a:{d:'2010s',s:8},b:{d:'2010s',s:9}},
    {n:4,date:'2026-08-21',a:{d:'2020s',s:8},b:{d:'2020s',s:9}},
    {n:5,date:'2026-08-28',a:{d:'90s',  s:1},b:{win:1}},
    {n:6,date:'2026-09-04',a:{d:'2000s',s:1},b:{win:2}},
    {n:7,date:'2026-09-11',a:{d:'2010s',s:1},b:{win:3}},
    {n:8,date:'2026-09-18',a:{d:'2020s',s:1},b:{win:4}},
    {n:9,date:'2026-10-02',a:{d:'90s',  s:4},b:{d:'90s',  s:5}},
    {n:10,date:'2026-10-09',a:{d:'2000s',s:4},b:{d:'2000s',s:5}},
    {n:11,date:'2026-10-16',a:{d:'2010s',s:4},b:{d:'2010s',s:5}},
    {n:12,date:'2026-10-23',a:{d:'2020s',s:4},b:{d:'2020s',s:5}},
    {n:13,date:'2026-10-30',a:{d:'90s',  s:2},b:{d:'90s',  s:7}},
    {n:14,date:'2026-11-06',a:{d:'2000s',s:2},b:{d:'2000s',s:7}},
    {n:15,date:'2026-11-13',a:{d:'2010s',s:2},b:{d:'2010s',s:7}},
    {n:16,date:'2026-11-20',a:{d:'2020s',s:2},b:{d:'2020s',s:7}},
    {n:17,date:'2026-12-04',a:{d:'90s',  s:3},b:{d:'90s',  s:6}},
    {n:18,date:'2026-12-11',a:{d:'2000s',s:3},b:{d:'2000s',s:6}},
    {n:19,date:'2026-12-18',a:{d:'2010s',s:3},b:{d:'2010s',s:6}},
    {n:20,date:'2027-01-08',a:{d:'2020s',s:3},b:{d:'2020s',s:6}},
    {n:21,date:'2027-01-15',a:{win:5}, b:{win:9}},
    {n:22,date:'2027-01-22',a:{win:6}, b:{win:10}},
    {n:23,date:'2027-01-29',a:{win:7}, b:{win:11}},
    {n:24,date:'2027-02-05',a:{win:8}, b:{win:12}},
    {n:25,date:'2027-02-12',a:{win:13},b:{win:17}},
    {n:26,date:'2027-02-26',a:{win:14},b:{win:18}},
    {n:27,date:'2027-03-05',a:{win:15},b:{win:19}},
    {n:28,date:'2027-03-12',a:{win:16},b:{win:20}},
    {n:29,date:'2027-03-19',a:{win:21},b:{win:25}},
    {n:30,date:'2027-03-26',a:{win:22},b:{win:26}},
    {n:31,date:'2027-04-02',a:{win:23},b:{win:27}},
    {n:32,date:'2027-04-16',a:{win:24},b:{win:28}},
    {n:33,date:'2027-04-23',a:{win:29},b:{win:32}},
    {n:34,date:'2027-04-30',a:{win:30},b:{win:31}},
    {n:35,date:'2027-05-07',a:{win:33},b:{win:34}},
    {n:36,date:'2027-05-14',a:{lose:33},b:{lose:34}},
  ];

  function _sbSong(d,s){ return SB_SONGS[d]?.[s-1]??null; }
  function _sbResolve(spec, results) {
    if (spec.d) return _sbSong(spec.d, spec.s);
    const ref = spec.win ?? spec.lose;
    const r = results.get(ref);
    if (!r) return null;
    const g = SB_GAMES[ref-1];
    const side = (spec.win!==undefined) ? (r.wi===0?g.a:g.b) : (r.wi===0?g.b:g.a);
    return _sbResolve(side, results);
  }

  async function sbResolveMatchup(forDate) {
    const game = SB_GAMES.find(g => g.date === forDate);
    if (!game) return null;
    const pastDates = SB_GAMES.filter(g => g.date <= forDate).map(g => g.date);
    const rows = await sbGet('qotd_votes',
      `date=in.(${pastDates.join(',')})&select=date,option_index`);
    const tally = new Map();
    for (const v of rows) {
      if (!tally.has(v.date)) tally.set(v.date, [0,0]);
      tally.get(v.date)[v.option_index] = (tally.get(v.date)[v.option_index]||0) + 1;
    }
    const results = new Map();
    for (const g of SB_GAMES) {
      const t = tally.get(g.date);
      if (!t || t[0]+t[1]===0) continue;
      results.set(g.n, { wi: t[1]>t[0]?1:0 });
    }
    const sA = _sbResolve(game.a, results);
    const sB = _sbResolve(game.b, results);
    if (!sA || !sB) return null;
    return [
      `${sA.title} – ${sA.artist}`,
      `${sB.title} – ${sB.artist}`,
    ];
  }
  // ─────────────────────────────────────────────

  const params   = new URLSearchParams(location.search);
  const date     = params.get('date') || todayISO();
  const voterId  = params.get('voter') || getVoterId();
  const lsKey    = 'qotd-page-voted-' + date;

  function todayISO() {
    const d = new Date();
    return d.getFullYear() + '-' +
      String(d.getMonth()+1).padStart(2,'0') + '-' +
      String(d.getDate()).padStart(2,'0');
  }

  function getVoterId() {
    let id = localStorage.getItem('qotd-device-id');
    if (!id) {
      id = Math.random().toString(36).slice(2,10) + Date.now().toString(36);
      localStorage.setItem('qotd-device-id', id);
    }
    return id;
  }

  async function sbGet(table, query) {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${query}`, {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
    });
    if (!res.ok) throw new Error('Network error');
    return res.json();
  }

  async function sbPost(table, body) {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
      method: 'POST',
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': 'Bearer ' + SUPABASE_KEY,
        'Content-Type': 'application/json',
        'Prefer': 'resolution=ignore-duplicates',
      },
      body: JSON.stringify(body),
    });
    return res.ok || res.status === 409;
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function showThanks(alreadyVoted) {
    document.getElementById('card').innerHTML = `
      <div class="logo">Walton High School &mdash; Question of the Day</div>
      <div class="thanks">
        <div class="thanks-check">
          <svg width="28" height="28" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </div>
        <h2>${alreadyVoted ? 'Already voted!' : 'Thanks for voting!'}</h2>
        <p>Your response has been recorded.</p>
      </div>
      <button class="close-btn" onclick="window.close()">Close Tab</button>`;
  }

  function showError(msg) {
    document.getElementById('card').innerHTML = `
      <div class="logo">Walton High School &mdash; Question of the Day</div>
      <div class="msg error">${esc(msg)}</div>`;
  }

  async function init() {
    // Already voted? Show thanks immediately.
    if (localStorage.getItem(lsKey)) { showThanks(true); return; }

    // Check server-side too
    try {
      const existing = await sbGet('qotd_votes',
        `date=eq.${date}&voter_id=eq.${encodeURIComponent(voterId)}&select=id&limit=1`);
      if (existing.length) { localStorage.setItem(lsKey, '1'); showThanks(true); return; }
    } catch(e) {}

    // Load question
    let question, options;
    try {
      const rows = await sbGet('qotd_questions', `date=eq.${date}&select=question,options`);
      if (!rows.length) { showError('No question found for today.'); return; }
      question = rows[0].question;
      options  = typeof rows[0].options === 'string' ? JSON.parse(rows[0].options) : rows[0].options;
      options  = await resolveWinnerPlaceholders(options, date);
    } catch(e) { showError('Unable to load question. Please try again.'); return; }

    // Render voting UI
    const card = document.getElementById('card');
    card.innerHTML = `
      <div class="logo">Walton High School &mdash; Question of the Day</div>
      <div class="question">${esc(question)}</div>
      <div class="options" id="opts">
        ${options.map((o, i) => `
          <button class="opt" onclick="vote(${i}, this)">
            <span class="letter">${LETTERS[i]}</span>${esc(o)}
          </button>`).join('')}
      </div>
      <div class="msg" id="msg"></div>
      <button class="close-btn" onclick="window.close()">Close Tab</button>`;
  }

  // Replace "[Last Week's Winner]" placeholders with the winning option from the most
  // recent preceding song battle question in qotd_questions.
  async function resolveWinnerPlaceholders(options, forDate) {
    const PLACEHOLDER = /\[last\s*week.?s?\s*winner\]/i;
    if (!options.some(o => PLACEHOLDER.test(o))) return options;

    try {
      // Find the most recent question before forDate (any day of week)
      const prevQ = await sbGet('qotd_questions',
        `date=lt.${forDate}&question=eq.Song Battle&select=date,options&order=date.desc&limit=1`);
      if (!prevQ.length) return options;

      const prevDate = prevQ[0].date;
      const prevOpts = typeof prevQ[0].options === 'string'
        ? JSON.parse(prevQ[0].options) : prevQ[0].options;

      const vRows = await sbGet('qotd_votes',
        `date=eq.${prevDate}&select=option_index`);
      if (!vRows.length) return options;

      const counts = {};
      vRows.forEach(v => { counts[v.option_index] = (counts[v.option_index] || 0) + 1; });
      const winnerIdx = Object.entries(counts).sort((a, b) => b[1] - a[1])[0][0];
      const winnerText = prevOpts[winnerIdx];

      return options.map(o => PLACEHOLDER.test(o) ? winnerText : o);
    } catch(e) {
      return options;
    }
  }

  let _voting = false;
  async function vote(idx, btn) {
    if (_voting) return;
    _voting = true;
    document.querySelectorAll('.opt').forEach(b => b.disabled = true);
    btn.classList.add('picked');

    const ok = await sbPost('qotd_votes', { date, option_index: idx, voter_id: voterId });
    if (ok) {
      localStorage.setItem(lsKey, '1');
      showThanks(false);
    } else {
      document.getElementById('msg').textContent = 'Something went wrong. Please try again.';
      document.getElementById('msg').classList.add('error');
      document.querySelectorAll('.opt').forEach(b => { b.disabled = false; });
      btn.classList.remove('picked');
      _voting = false;
    }
  }

  init();
</script>
</body>
</html>
